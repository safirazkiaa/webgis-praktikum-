<!DOCTYPE html>
<html>

<head>
    <title>Geospatial Mashup</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map {
            width: 100%;
            height: 600px;
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <script>
        // --- Inisialisasi Peta ---
        var mymap = L.map('map').setView([40.7580, -73.9855], 14);
        // --- Basemap OpenStreetMap ---
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">' +
                'OpenStreetMap</a> contributors'
        }).addTo(mymap);
        // --- Marker (Objek Titik) ---
        var marker = L.marker([40.7580, -73.9855]).addTo(mymap);
        marker.bindPopup('<b>Lokasi A</b><br>Deskripsi lokasi.');
        // --- Circle (Objek Lingkaran) ---
        var circle = L.circle([40.7580, -73.9855], {
            color: '#FF1493', fillColor: '#FFC0CB',
            fillOpacity: 0.5, radius: 500
        }).addTo(mymap);
        circle.bindPopup('Radius 200 m dari titik ini.');
        // --- Polygon (Objek Area) ---
        var polygon = L.polygon([
            [40.80065300397213, -73.95816365183715],
            [40.7969077480892, -73.94960077616685],
            [40.76463217617599, -73.97329139885467],
            [40.76823582905753, -73.98158105569401],
            [40.80065300397213, -73.95816365183715]
        ], { color: '#2E8B58', fillColor: '#00FF7F', fillOpacity: 0.3 })
            .addTo(mymap);
        polygon.bindPopup('Area Kawasan A');
        // --- Polyline (Objek Garis) ---
        var polyline = L.polyline([
            [40.7580, -73.9855],  // Times Square
            [40.75109368195884, -73.9906542059415],  // Empire State Building
            [40.74713024934685, -73.98143440710055],  // Washington Square Park
            [40.73535675812092, -73.9900802757192],
            [40.72750510099454, -73.99153087760635],
            [40.716746826555955, -73.99577906878898],
            [40.709364230974614, -73.99184172090087] 
        ], { color: '#FF0000', weight: 3, opacity: 0.8 })
            .addTo(mymap);
        polyline.bindPopup('Jalur A');
    </script>
</body>

</html>
